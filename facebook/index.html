<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting to Facebook</title>

  <noscript>
    <meta http-equiv="refresh" content="5; url=https://www.facebook.com/groups/228419265212105/?ref=share&amp;mibextid=I6gGtw" />
  </noscript>

  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600&amp;display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/pages/facebook.css" />
  <script src="/assets/js/pages/facebook.js" defer></script>
</head>

<body>
  <div class="container" role="status" aria-live="polite">
    <h1>We're redirecting you to Facebook</h1>
    <p>Just a moment! You will be there in <span id="countdown">5</span> seconds...</p>
    <div class="icon">
      <img
        src="https://upload.wikimedia.org/wikipedia/commons/5/51/Facebook_f_logo_%282019%29.svg"
        class="social-icon"
        alt="Facebook Logo"
      />
    </div>
    <div class="loader" aria-hidden="true"></div>
    <p class="countdown">
      If not redirected,
      <a href="https://www.facebook.com/groups/228419265212105/?ref=share&amp;mibextid=I6gGtw" class="redirect-link"
        >click here</a
      >.
    </p>
  </div>
</body>

</html>
