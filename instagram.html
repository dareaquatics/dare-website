<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting to Instagram</title>

  <noscript>
    <meta http-equiv="refresh" content="5; url=https://instagram.com/dareaquatics" />
  </noscript>

  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600&amp;display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/pages/instagram.css" />
  <script src="/assets/js/pages/instagram.js" defer></script>
</head>

<body>
  <div class="container" role="status" aria-live="polite">
    <h1>We're redirecting you to Instagram</h1>
    <p>Hang tight! You'll be there in <span id="countdown">5</span> seconds...</p>
    <div class="icon">
      <img
        src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png"
        class="social-icon"
        alt="Instagram Logo"
      />
    </div>
    <div class="loader" aria-hidden="true"></div>
    <p class="countdown">
      If not redirected, <a href="https://instagram.com/dareaquatics" class="redirect-link">click here</a>.
    </p>
  </div>
</body>

</html>
